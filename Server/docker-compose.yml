services:
  db:
    image: postgres:15
    container_name: postgres-bmt
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - bmt_db_data:/var/lib/postgresql/data

volumes:
  bmt_db_data:
